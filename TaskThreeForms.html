<!DOCTYPE html>
<html lang="en">
<head>
    <title>Forms</title>
</head>
<body>

    <h1><font color="orange">How can we help?</font></h1>

    <form action="#">
        <fieldset>
            <b><font color="purple">Request for Proposal</font></b>

            <table>
                <tr>
                    <td align="right">Your name:</td>
                    <td><input type="text" name="name" size="25"></td>
                </tr>
                <tr>
                    <td align="right">Email:</td>
                    <td><input type="email" name="email" size="25"></td>
                </tr>
                <tr>
                    <td align="right">Username:</td>
                    <td><input type="text" name="username" size="25"></td>
                </tr>
                <tr>
                    <td align="right">Password:</td>
                    <td><input type="password" name="pass" size="25"></td>
                </tr>
                <tr>
                    <td align="right" valign="top">Your Business:</td>
                    <td>
                        <textarea name="business" rows="7" cols="35">Briefly describe your business
in this space</textarea>
                    </td>
                </tr>
                <tr>
                    <td align="right" valign="top">Company size:</td>
                    <td>
                        <input type="radio" name="company_size" value="less10"> Less than 10<br>
                        <input type="radio" name="company_size" value="11to50"> 11 to 50<br>
                        <input type="radio" name="company_size" value="50to200"> 50 to 200<br>
                        <input type="radio" name="company_size" value="over200"> Over 200<br>
                    </td>
                </tr>
                <tr>
                    <td align="right">Service:</td>
                    <td>
                        <input type="checkbox" name="service" value="brand"> Brand Identity
                        <input type="checkbox" name="service" value="website"> New Website
                        <input type="checkbox" name="service" value="redesign"> Web Redisigner
                    </td>
                </tr>
                <tr>
                    <td align="right">Timeline:</td>
                    <td>
                        <select name="timeline">
                            <option value="immediately">Imedialtely</option>
                            <option value="1-2weeks">1-2 weeks</option>
                            <option value="3-7weeks">3-7 weeks</option>
                            <option value="7-2months">7-2 months</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Send to dev\design">
                    </td>
                </tr>
            </table>

        </fieldset>
    </form>

</body>
</html>
